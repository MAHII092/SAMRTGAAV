<!DOCTYPE html>
<html>
<head>
  <title>Smart Tiruka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#064e3b);color:white;min-height:100vh}
    .center{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card,.pageCard{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:18px;margin-bottom:12px}
    .card{width:100%;max-width:430px;padding:25px}
    .logo,.miniLogo{background:#22c55e;display:flex;align-items:center;justify-content:center;font-weight:900}
    .logo{width:70px;height:70px;border-radius:22px;font-size:28px;margin-bottom:15px}
    .miniLogo{width:48px;height:48px;border-radius:16px;font-size:20px}
    input,select,textarea,button{width:100%;padding:14px;margin:8px 0;border-radius:15px;border:0;font-size:15px}
    textarea{min-height:80px}
    input,select,textarea{background:white;color:#111}
    button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
    .red{background:#ef4444}.blue{background:#3b82f6}.orange{background:#f97316}
    .hidden{display:none}.small{font-size:13px;color:#d1fae5}
    .top{padding:18px;max-width:900px;margin:auto;padding-bottom:95px}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .noticePanel{position:sticky;top:8px;z-index:999;background:rgba(15,23,42,.92);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:12px;margin:12px 0}
    .noticeHead{font-weight:bold;margin-bottom:8px;color:#fde68a}
    .noticeItem{background:rgba(239,68,68,.22);border:1px solid rgba(248,113,113,.5);padding:10px;border-radius:14px;margin-bottom:8px}
    .noticeTime{font-size:12px;color:#ffedd5;margin-top:4px}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:15px 0}
    .stat{background:rgba(255,255,255,.13);padding:14px;border-radius:18px;text-align:center}
    .stat b{font-size:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
    .tile{background:rgba(255,255,255,.15);padding:18px;border-radius:20px;text-align:center;border:1px solid rgba(255,255,255,.18);cursor:pointer;min-height:88px}
    .tile span{font-size:26px}
    .list{margin-top:18px;background:rgba(255,255,255,.10);padding:15px;border-radius:20px;max-height:560px;overflow:auto}
    .item{background:rgba(255,255,255,.12);padding:12px;border-radius:15px;margin-bottom:10px;text-align:left}
    .proofImg{width:100%;max-height:220px;object-fit:cover;border-radius:14px;margin-top:10px}
    a{color:#86efac;text-decoration:none}
    .bottomNav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.92);display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px}
    .navBtn{text-align:center;font-size:12px;color:#d1fae5;padding:6px}
  </style>
</head>

<body>

<div id="loginPage" class="center">
  <div class="card">
    <div class="logo">ST</div>
    <h1>Smart Tiruka</h1>
    <p class="small">Digital Gram Panchayat App</p>
    <input id="userid" placeholder="User ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="small">Signup nahi. User ID admin kadun milel.</p>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="top">
    <div class="header">
      <div class="miniLogo">ST</div>
      <div>
        <h2 id="welcome" style="margin:0">Welcome</h2>
        <p id="roleText" class="small" style="margin:4px 0"></p>
      </div>
    </div>

    <div id="noticePanel" class="noticePanel hidden"></div>
    <button onclick="enableNotifications()">🔔 Allow Notifications + Sound</button>

    <div id="statsBox" class="stats hidden">
      <div class="stat"><b id="totalCount">0</b><br>Total</div>
      <div class="stat"><b id="pendingCount">0</b><br>Pending</div>
      <div class="stat"><b id="doneCount">0</b><br>Done</div>
    </div>

    <div class="grid">
      <div class="tile" onclick="openComplaint()"><span>📸</span><br>Complaint Tak</div>
      <div class="tile" onclick="showComplaints()"><span>📋</span><br>Complaints</div>
      <div class="tile" onclick="showEmergency()"><span>🚨</span><br>Emergency</div>
      <div class="tile" onclick="showProfile()"><span>👤</span><br>Profile</div>
      <div class="tile" onclick="showYojana()"><span>🏛️</span><br>Yojana</div>
      <div class="tile" onclick="showDirectory()"><span>📍</span><br>Directory</div>
      <div id="adminTile" class="tile hidden" onclick="showAdmin()"><span>👑</span><br>Admin Portal</div>
      <div class="tile red" onclick="logout()"><span>🚪</span><br>Logout</div>
    </div>

    <div id="contentBox" class="list hidden"></div>
  </div>

  <div class="bottomNav">
    <div class="navBtn" onclick="goHome()">🏠<br>Home</div>
    <div class="navBtn" onclick="openComplaint()">📸<br>Complaint</div>
    <div class="navBtn" onclick="showComplaints()">📋<br>List</div>
    <div class="navBtn" onclick="showProfile()">👤<br>Profile</div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwYKdDhvZFz0bEUlEq0r19ID_6ABZBZCqJg3ahZt6418vQtHuxIPv2drPfdN0lh4iSp/exec";

const GOOGLE_FORM_BASE =
"https://docs.google.com/forms/d/e/1FAIpQLSeUPWZjLyAOw4onOJo8IaVuLrRzLgcan3rcF5oJmuwYlesjpg/viewform?usp=pp_url&entry.1114604525=";

const COMPLAINT_SHEET =
"https://docs.google.com/spreadsheets/d/1ucvPtqDwXeENkjp2bFSHdF-tYzAohXqLiYHyBt6kGp8/gviz/tq?tqx=out:json";

const NOTICE_SHEET =
"https://docs.google.com/spreadsheets/d/1TbKkPxppuIDj42IASzraw9VlFui260w927yYD9nP4wk/gviz/tq?tqx=out:json";

let users = [
  { id:"ADMIN", pass:"1234", name:"Mahesh Admin", mobile:"98xxxxxxx", address:"Tiruka", role:"Admin" },
  { id:"GAAV001", pass:"1234", name:"Ramesh", mobile:"97xxxxxxx", address:"Wasti 1", role:"User" },
  { id:"GAAV002", pass:"1234", name:"Suresh", mobile:"96xxxxxxx", address:"Wasti 2", role:"User" }
];

let currentUser = null;
let allComplaints = [];
let allNotices = [];
let soundAllowed = false;

function apiPost(payload){
  fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });
}

function login(){
  let id = document.getElementById("userid").value.trim();
  let pass = document.getElementById("password").value.trim();
  let user = users.find(u => u.id === id && u.pass === pass);

  if(user){
    currentUser = user;
    localStorage.setItem("smarttiruka_user", JSON.stringify(user));
    openApp();
  }else{
    alert("Wrong ID or Password");
  }
}

function openApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Namaskar, " + currentUser.name;
  document.getElementById("roleText").innerText = "Role: " + currentUser.role + " | ID: " + currentUser.id;

  if(currentUser.role === "Admin"){
    document.getElementById("adminTile").classList.remove("hidden");
    document.getElementById("statsBox").classList.remove("hidden");
    loadComplaints(false);
  }
  loadNotices();
}

window.onload = function(){
  let saved = localStorage.getItem("smarttiruka_user");
  if(saved){
    currentUser = JSON.parse(saved);
    openApp();
  }
}

function logout(){
  localStorage.removeItem("smarttiruka_user");
  location.reload();
}

function goHome(){
  document.getElementById("contentBox").classList.add("hidden");
}

function openComplaint(){
  window.open(GOOGLE_FORM_BASE + encodeURIComponent(currentUser.id), "_blank");
}

function enableNotifications(){
  soundAllowed = true;
  localStorage.setItem("sound_allowed","yes");
  if("Notification" in window){
    Notification.requestPermission();
  }
  alert("Notification/Sound enabled ✅");
}

function autoNow(){
  return new Date().toLocaleString("en-IN", {
    day:"2-digit", month:"2-digit", year:"numeric",
    hour:"2-digit", minute:"2-digit", hour12:true
  });
}

function loadNotices(){
  fetch(NOTICE_SHEET)
    .then(res => res.text())
    .then(data => {
      let json = JSON.parse(data.substr(47).slice(0,-2));
      let rows = json.table.rows;
      allNotices = rows.map((r,index)=>({
        title:r.c[0]?.v || "Notice",
        message:r.c[1]?.v || "",
        date:r.c[2]?.f || r.c[2]?.v || autoNow(),
        type:r.c[3]?.v || "Normal"
      })).reverse();
      showNoticeList();
    });
}

function showNoticeList(){
  const panel = document.getElementById("noticePanel");
  if(allNotices.length === 0){panel.classList.add("hidden");return;}

  let html = `<div class="noticeHead">📢 Latest Notices</div>`;
  allNotices.slice(0,4).forEach(n=>{
    html += `<div class="noticeItem">
      <b>${n.type.toLowerCase()==="urgent" ? "🚨" : "📌"} ${n.title}</b><br>
      ${n.message}
      <div class="noticeTime">🕒 ${n.date}</div>
    </div>`;
  });
  panel.innerHTML = html;
  panel.classList.remove("hidden");
}

setInterval(loadNotices,60000);

function getDirectImageLink(link){
  if(!link) return "";
  if(link.includes("drive.google.com")){
    let match = link.match(/[-\w]{25,}/);
    if(match) return "https://drive.google.com/uc?export=view&id=" + match[0];
  }
  return link;
}

function loadComplaints(showBox=true){
  const box = document.getElementById("contentBox");
  if(showBox){box.classList.remove("hidden");box.innerHTML="Loading complaints...";}

  fetch(COMPLAINT_SHEET)
    .then(res => res.text())
    .then(data => {
      let json = JSON.parse(data.substr(47).slice(0,-2));
      let rows = json.table.rows;

      allComplaints = rows.map((r,index)=>({
        no:index+1,
        userId:r.c[0]?.v || "N/A",
        name:r.c[1]?.v || "N/A",
        problem:r.c[2]?.v || "N/A",
        photo:r.c[3]?.v || "",
        date:r.c[4]?.f || r.c[4]?.v || "N/A",
        status:r.c[5]?.v || "Pending"
      }));

      updateStats();

      if(showBox){
        if(currentUser.role==="Admin") renderComplaints(allComplaints,"📋 All Complaints");
        else renderComplaints(allComplaints.filter(c=>c.userId===currentUser.id),"📋 My Complaints");
      }
    })
    .catch(err => box.innerHTML="Error: Complaint sheet public nahi kiwa link wrong ahe.");
}

function updateStats(){
  document.getElementById("totalCount").innerText = allComplaints.length;
  document.getElementById("pendingCount").innerText = allComplaints.filter(c=>c.status.toLowerCase().includes("pending")).length;
  document.getElementById("doneCount").innerText = allComplaints.filter(c=>c.status.toLowerCase().includes("done")).length;
}

function showComplaints(){loadComplaints(true);}

function renderComplaints(list,title){
  const box=document.getElementById("contentBox");
  let html=`<h3>${title}</h3>
  <input id="searchBox" placeholder="Search by name, problem, user id" oninput="filterComplaints()">
  <select id="statusFilter" onchange="filterComplaints()">
    <option value="all">All Status</option>
    <option value="pending">Pending</option>
    <option value="done">Done</option>
    <option value="progress">In Progress</option>
  </select>`;

  if(list.length===0) html+="<p>No complaints found.</p>";

  list.forEach(c=>{
    let img = getDirectImageLink(c.photo);
    html+=`<div class="item">
      <b>#${c.no} - ${c.problem}</b><br>
      👤 User: ${c.name} (${c.userId})<br>
      📅 Date: ${c.date}<br>
      📌 Status: ${c.status}<br>
      ${c.photo ? `<a href="${c.photo}" target="_blank">📷 Open Proof</a>` : ""}
      ${img ? `<img class="proofImg" src="${img}" onerror="this.style.display='none'">` : ""}
      ${currentUser.role==="Admin" ? `
        <button class="blue" onclick="updateComplaintStatus('${c.userId}','In Progress')">🔄 Mark In Progress</button>
        <button onclick="updateComplaintStatus('${c.userId}','Done')">✅ Mark Done</button>
      ` : ""}
    </div>`;
  });

  box.innerHTML=html;
}

function updateComplaintStatus(userId,status){
  apiPost({type:"updateComplaint", userId:userId, status:status});
  alert("Status update request sent ✅ 1 min nantar refresh kara.");
}

function filterComplaints(){
  let q=document.getElementById("searchBox").value.toLowerCase();
  let status=document.getElementById("statusFilter").value.toLowerCase();
  let sourceList=currentUser.role==="Admin"?allComplaints:allComplaints.filter(c=>c.userId===currentUser.id);
  let filtered=sourceList.filter(c=>{
    let text=(c.userId+" "+c.name+" "+c.problem).toLowerCase();
    let statusMatch=status==="all" || c.status.toLowerCase().includes(status);
    return text.includes(q) && statusMatch;
  });
  renderComplaints(filtered,currentUser.role==="Admin"?"📋 All Complaints":"📋 My Complaints");
  document.getElementById("searchBox").value=q;
  document.getElementById("statusFilter").value=status;
}

function showPage(title, html){
  const box = document.getElementById("contentBox");
  box.classList.remove("hidden");
  box.innerHTML = `<h3>${title}</h3>${html}`;
}

function showProfile(){
  showPage("👤 My Profile", `
    <div class="pageCard">
      <h2>${currentUser.name}</h2>
      <p>Role: ${currentUser.role}</p>
      <p>ID: ${currentUser.id}</p>
      <p>Mobile: ${currentUser.mobile}</p>
      <p>Address: ${currentUser.address}</p>
    </div>
  `);
}

function showEmergency(){
  showPage("🚨 Emergency Contacts", `
    <div class="pageCard"><h3>Ambulance</h3><a href="tel:108"><button class="red">📞 Call 108</button></a></div>
    <div class="pageCard"><h3>Police</h3><a href="tel:100"><button class="blue">📞 Call 100</button></a></div>
    <div class="pageCard"><h3>Sarpanch</h3><a href="tel:9800000000"><button>📞 Call Sarpanch</button></a></div>
    <div class="pageCard"><h3>Doctor</h3><a href="tel:9900000000"><button class="orange">📞 Call Doctor</button></a></div>
  `);
}

function showYojana(){
  showPage("🏛️ Sarkari Yojana", `
    <div class="pageCard"><h3>PM Awas Yojana</h3><p>घरकुल योजनेसाठी documents guide.</p></div>
    <div class="pageCard"><h3>Farmer Scheme</h3><p>शेतकरी योजनांची माहिती.</p></div>
    <div class="pageCard"><h3>Scholarship</h3><p>Students scholarship updates.</p></div>
  `);
}

function showDirectory(){
  showPage("📍 Gaav Main Points", `
    <div class="pageCard"><img class="proofImg" src="https://images.unsplash.com/photo-1604999333679-b86d54738315?q=80&w=900"><h3>🛕 Temple / Mandir</h3><p>Gaavacha mukhya mandir.</p></div>
    <div class="pageCard"><img class="proofImg" src="https://images.unsplash.com/photo-1580582932707-520aed937b7b?q=80&w=900"><h3>🏫 School</h3><p>Gaavatil school point.</p></div>
    <div class="pageCard"><img class="proofImg" src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=900"><h3>🏛️ Gram Panchayat Office</h3><p>Main office.</p></div>
    <div class="pageCard"><img class="proofImg" src="https://images.unsplash.com/photo-1538300342682-cf57afb97285?q=80&w=900"><h3>💧 Water Tank</h3><p>Pani supply point.</p></div>
  `);
}

function showAdmin(){
  showPage("👑 Admin Portal", `
    <div class="pageCard">
      <h3>➕ Add User</h3>
      <input id="newId" placeholder="User ID e.g. GAAV003">
      <input id="newPass" placeholder="Password">
      <input id="newName" placeholder="Name">
      <input id="newMobile" placeholder="Mobile">
      <input id="newAddress" placeholder="Address">
      <button onclick="adminAddUser()">Add User</button>
    </div>

    <div class="pageCard">
      <h3>📢 Add Notice</h3>
      <input id="noticeTitle" placeholder="Notice Title">
      <textarea id="noticeMsg" placeholder="Notice Message"></textarea>
      <select id="noticeType">
        <option>Normal</option>
        <option>Urgent</option>
        <option>Meeting</option>
      </select>
      <button onclick="adminAddNotice()">Add Notice</button>
    </div>

    <div class="pageCard">
      <h3>📍 Add Place / Photo</h3>
      <input id="placeName" placeholder="Place Name">
      <input id="placeCat" placeholder="Category e.g. Temple">
      <textarea id="placeDesc" placeholder="Description"></textarea>
      <input id="placeImage" placeholder="Image Link">
      <input id="placeMap" placeholder="Map Link">
      <button onclick="adminAddPlace()">Add Place</button>
    </div>
  `);
}

function adminAddUser(){
  apiPost({
    type:"addUser",
    id:document.getElementById("newId").value,
    password:document.getElementById("newPass").value,
    name:document.getElementById("newName").value,
    mobile:document.getElementById("newMobile").value,
    address:document.getElementById("newAddress").value
  });
  alert("User add request sent ✅");
}

function adminAddNotice(){
  apiPost({
    type:"addNotice",
    title:document.getElementById("noticeTitle").value,
    message:document.getElementById("noticeMsg").value,
    type:document.getElementById("noticeType").value
  });
  alert("Notice add request sent ✅ 1 min nantar दिसेल.");
}

function adminAddPlace(){
  apiPost({
    type:"addPlace",
    name:document.getElementById("placeName").value,
    category:document.getElementById("placeCat").value,
    description:document.getElementById("placeDesc").value,
    image:document.getElementById("placeImage").value,
    map:document.getElementById("placeMap").value
  });
  alert("Place add request sent ✅");
}
</script>

</body>
</html>
