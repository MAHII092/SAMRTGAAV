<!DOCTYPE html>
<html>
<head>
  <title>Smart Tiruka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#064e3b">

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#064e3b);color:white;min-height:100vh}
    .center{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{width:100%;max-width:430px;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.2);border-radius:26px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .logo{width:70px;height:70px;border-radius:22px;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;margin-bottom:15px}
    input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:15px;border:0;font-size:15px}
    input,select{background:white;color:#111}
    button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
    .logout{background:#ef4444}
    .hidden{display:none}
    .small{font-size:13px;color:#d1fae5}
    .top{padding:18px;max-width:900px;margin:auto;padding-bottom:95px}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .miniLogo{width:48px;height:48px;border-radius:16px;background:#22c55e;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px}
    .banner{padding:14px;border-radius:18px;margin:12px 0;background:rgba(239,68,68,.25);border:1px solid rgba(248,113,113,.5)}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:15px 0}
    .stat{background:rgba(255,255,255,.13);padding:14px;border-radius:18px;text-align:center;border:1px solid rgba(255,255,255,.14)}
    .stat b{font-size:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
    .tile{background:rgba(255,255,255,.15);padding:18px;border-radius:20px;text-align:center;border:1px solid rgba(255,255,255,.18);cursor:pointer;min-height:88px}
    .tile span{font-size:26px}
    .list{margin-top:18px;background:rgba(255,255,255,.10);padding:15px;border-radius:20px;max-height:520px;overflow:auto}
    .item{background:rgba(255,255,255,.12);padding:12px;border-radius:15px;margin-bottom:10px;text-align:left;border:1px solid rgba(255,255,255,.15)}
    .urgent{border-color:#f87171;background:rgba(239,68,68,.22)}
    .meeting{border-color:#60a5fa;background:rgba(59,130,246,.20)}
    .normal{border-color:#86efac;background:rgba(34,197,94,.14)}
    a{color:#86efac}
    .bottomNav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.92);backdrop-filter:blur(18px);display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px;border-top:1px solid rgba(255,255,255,.15)}
    .navBtn{text-align:center;font-size:12px;color:#d1fae5;padding:6px;border-radius:14px}
  </style>
</head>

<body>

<div id="loginPage" class="center">
  <div class="card">
    <div class="logo">ST</div>
    <h1>Smart Tiruka</h1>
    <p class="small">Digital Gram Panchayat App</p>
    <input id="userid" placeholder="User ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="small">Signup nahi. User ID admin kadun milel.</p>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="top">

    <div class="header">
      <div class="miniLogo">ST</div>
      <div>
        <h2 id="welcome" style="margin:0">Welcome</h2>
        <p id="roleText" class="small" style="margin:4px 0"></p>
      </div>
    </div>

    <div id="noticeBanner" class="banner hidden"></div>
    <button onclick="enableNotifications()">🔔 Allow Notifications</button>

    <div id="statsBox" class="stats hidden">
      <div class="stat"><b id="totalCount">0</b><br>Total</div>
      <div class="stat"><b id="pendingCount">0</b><br>Pending</div>
      <div class="stat"><b id="doneCount">0</b><br>Done</div>
    </div>

    <div class="grid">
      <div class="tile" onclick="openComplaint()"><span>📸</span><br>Complaint Tak</div>
      <div class="tile" onclick="showComplaints()"><span>📋</span><br>Complaints</div>
      <div class="tile" onclick="showNotices()"><span>📢</span><br>Notice</div>
      <div class="tile" onclick="showEmergency()"><span>🚨</span><br>Emergency</div>
      <div class="tile" onclick="showProfile()"><span>👤</span><br>Profile</div>
      <div class="tile" onclick="showYojana()"><span>🏛️</span><br>Yojana</div>
      <div class="tile" onclick="showDirectory()"><span>🏪</span><br>Directory</div>
      <div id="adminTile" class="tile hidden" onclick="showAdmin()"><span>👑</span><br>Admin</div>
      <div class="tile logout" onclick="logout()"><span>🚪</span><br>Logout</div>
    </div>

    <div id="contentBox" class="list hidden"></div>

  </div>

  <div class="bottomNav">
    <div class="navBtn" onclick="goHome()">🏠<br>Home</div>
    <div class="navBtn" onclick="openComplaint()">📸<br>Complaint</div>
    <div class="navBtn" onclick="showNotices()">📢<br>Notice</div>
    <div class="navBtn" onclick="showProfile()">👤<br>Profile</div>
  </div>
</div>

<script>
const GOOGLE_FORM_BASE =
"https://docs.google.com/forms/d/e/1FAIpQLSeUPWZjLyAOw4onOJo8IaVuLrRzLgcan3rcF5oJmuwYlesjpg/viewform?usp=pp_url&entry.1114604525=";

const COMPLAINT_SHEET =
"https://docs.google.com/spreadsheets/d/1ucvPtqDwXeENkjp2bFSHdF-tYzAohXqLiYHyBt6kGp8/gviz/tq?tqx=out:json";

const NOTICE_SHEET =
"https://docs.google.com/spreadsheets/d/1TbKkPxppuIDj42IASzraw9VlFui260w927yYD9nP4wk/edit?usp=sharing";

let users = [
  { id:"ADMIN", pass:"1234", name:"Mahesh Admin", mobile:"98xxxxxxx", address:"Tiruka", role:"Admin" },
  { id:"GAAV001", pass:"1234", name:"Ramesh", mobile:"97xxxxxxx", address:"Wasti 1", role:"User" },
  { id:"GAAV002", pass:"1234", name:"Suresh", mobile:"96xxxxxxx", address:"Wasti 2", role:"User" }
];

let currentUser = null;
let allComplaints = [];
let allNotices = [];

function login(){
  let id = document.getElementById("userid").value.trim();
  let pass = document.getElementById("password").value.trim();
  let user = users.find(u => u.id === id && u.pass === pass);

  if(user){
    currentUser = user;
    localStorage.setItem("smarttiruka_user", JSON.stringify(user));
    openApp();
  }else{
    alert("Wrong ID or Password");
  }
}

function openApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Namaskar, " + currentUser.name;
  document.getElementById("roleText").innerText = "Role: " + currentUser.role + " | ID: " + currentUser.id;

  if(currentUser.role === "Admin"){
    document.getElementById("adminTile").classList.remove("hidden");
    document.getElementById("statsBox").classList.remove("hidden");
    loadComplaints(false);
  }

  loadNotices(false);
}

window.onload = function(){
  let saved = localStorage.getItem("smarttiruka_user");
  if(saved){
    currentUser = JSON.parse(saved);
    openApp();
  }
}

function logout(){
  localStorage.removeItem("smarttiruka_user");
  location.reload();
}

function goHome(){
  document.getElementById("contentBox").classList.add("hidden");
}

function openComplaint(){
  window.open(GOOGLE_FORM_BASE + encodeURIComponent(currentUser.id), "_blank");
}

function enableNotifications(){
  if(!("Notification" in window)){
    alert("Ya browser madhe notification support nahi.");
    return;
  }
  Notification.requestPermission().then(permission => {
    if(permission === "granted"){
      alert("Notifications allowed ✅");
    }else{
      alert("Notifications allow nahi kele.");
    }
  });
}

function loadNotices(showBox=true){
  const box = document.getElementById("contentBox");
  if(showBox){
    box.classList.remove("hidden");
    box.innerHTML = "Loading notices...";
  }

  fetch(NOTICE_SHEET)
    .then(res => res.text())
    .then(data => {
      let json = JSON.parse(data.substr(47).slice(0,-2));
      let rows = json.table.rows;

      allNotices = rows.map((r, index) => ({
        no:index+1,
        title:r.c[0]?.v || "Notice",
        message:r.c[1]?.v || "",
        date:r.c[2]?.f || r.c[2]?.v || "",
        type:r.c[3]?.v || "Normal"
      })).reverse();

      showTopUrgentNotice();

      if(showBox) renderNotices();
    })
    .catch(err => {
      if(showBox) box.innerHTML = "Error: NOTICES sheet name/check public access.";
    });
}

function showTopUrgentNotice(){
  let urgent = allNotices.find(n => n.type.toLowerCase() === "urgent");
  const banner = document.getElementById("noticeBanner");

  if(urgent){
    banner.classList.remove("hidden");
    banner.innerHTML = `<b>🚨 ${urgent.title}</b><br>${urgent.message}<br><span class="small">${urgent.date}</span>`;

    let lastNotice = localStorage.getItem("last_notice_title");
    if(lastNotice !== urgent.title){
      localStorage.setItem("last_notice_title", urgent.title);

      if("Notification" in window && Notification.permission === "granted"){
        new Notification("🚨 Smart Tiruka Notice", {
          body: urgent.title + " - " + urgent.message
        });
      }
    }
  }else{
    banner.classList.add("hidden");
  }
}

function showNotices(){
  loadNotices(true);
}

function renderNotices(){
  const box = document.getElementById("contentBox");

  let html = `<h3>📢 Live Notice Board</h3>`;

  if(allNotices.length === 0){
    html += "<p>No notices found.</p>";
  }

  allNotices.forEach(n => {
    let cls = n.type.toLowerCase() === "urgent" ? "urgent" :
              n.type.toLowerCase() === "meeting" ? "meeting" : "normal";

    html += `
      <div class="item ${cls}">
        <b>${n.type === "Urgent" ? "🚨" : "📢"} ${n.title}</b><br>
        ${n.message}<br>
        📅 ${n.date}<br>
        🏷️ ${n.type}
      </div>
    `;
  });

  box.innerHTML = html;
}

function loadComplaints(showBox=true){
  const box = document.getElementById("contentBox");

  if(showBox){
    box.classList.remove("hidden");
    box.innerHTML = "Loading complaints...";
  }

  fetch(COMPLAINT_SHEET)
    .then(res => res.text())
    .then(data => {
      let json = JSON.parse(data.substr(47).slice(0,-2));
      let rows = json.table.rows;

      allComplaints = rows.map((r, index) => ({
        no:index+1,
        userId:r.c[0]?.v || "N/A",
        name:r.c[1]?.v || "N/A",
        problem:r.c[2]?.v || "N/A",
        photo:r.c[3]?.v || "",
        date:r.c[4]?.f || r.c[4]?.v || "N/A",
        status:r.c[5]?.v || "Pending"
      }));

      updateStats();

      if(showBox){
        if(currentUser.role === "Admin"){
          renderComplaints(allComplaints, "📋 All Complaints");
        }else{
          renderComplaints(allComplaints.filter(c => c.userId === currentUser.id), "📋 My Complaints");
        }
      }
    })
    .catch(err => {
      box.innerHTML = "Error: Complaint sheet public nahi kiwa link wrong ahe.";
    });
}

function updateStats(){
  document.getElementById("totalCount").innerText = allComplaints.length;
  document.getElementById("pendingCount").innerText = allComplaints.filter(c => c.status.toLowerCase().includes("pending")).length;
  document.getElementById("doneCount").innerText = allComplaints.filter(c => c.status.toLowerCase().includes("done")).length;
}

function showComplaints(){
  loadComplaints(true);
}

function renderComplaints(list, title){
  const box = document.getElementById("contentBox");

  let html = `
    <h3>${title}</h3>
    <input id="searchBox" placeholder="Search by name, problem, user id" oninput="filterComplaints()">
    <select id="statusFilter" onchange="filterComplaints()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="done">Done</option>
      <option value="progress">In Progress</option>
    </select>
  `;

  if(list.length === 0){
    html += "<p>No complaints found.</p>";
  }

  list.forEach(c => {
    html += `
      <div class="item">
        <b>#${c.no} - ${c.problem}</b><br>
        👤 User: ${c.name} (${c.userId})<br>
        📅 Date: ${c.date}<br>
        📌 Status: ${c.status}<br>
        ${c.photo ? `<a href="${c.photo}" target="_blank">📷 View Photo</a>` : ""}
      </div>
    `;
  });

  box.innerHTML = html;
}

function filterComplaints(){
  let q = document.getElementById("searchBox").value.toLowerCase();
  let status = document.getElementById("statusFilter").value.toLowerCase();

  let sourceList = currentUser.role === "Admin"
    ? allComplaints
    : allComplaints.filter(c => c.userId === currentUser.id);

  let filtered = sourceList.filter(c => {
    let text = (c.userId + " " + c.name + " " + c.problem).toLowerCase();
    let statusMatch = status === "all" || c.status.toLowerCase().includes(status);
    return text.includes(q) && statusMatch;
  });

  renderComplaints(filtered, currentUser.role === "Admin" ? "📋 All Complaints" : "📋 My Complaints");
  document.getElementById("searchBox").value = q;
  document.getElementById("statusFilter").value = status;
}

function showEmergency(){
  alert("🚨 Emergency Contacts:\nAmbulance: 108\nPolice: 100\nSarpanch: 98xxxxxxx\nDoctor: 99xxxxxxx");
}

function showProfile(){
  alert("👤 Profile:\nName: " + currentUser.name + "\nID: " + currentUser.id + "\nMobile: " + currentUser.mobile + "\nAddress: " + currentUser.address);
}

function showYojana(){
  alert("🏛️ Sarkari Yojana:\nPM Awas Yojana\nRation Card\nFarmer Scheme\nScholarship");
}

function showDirectory(){
  alert("🏪 Gaav Directory:\nKirana Store\nMedical\nElectrician\nPlumber\nTractor Service");
}

function showAdmin(){
  alert("👑 Admin Panel:\nAdmin la all complaints + stats distat.\nNotice NOTICES sheet madhun live yete.");
}
</script>

</body>
</html>
