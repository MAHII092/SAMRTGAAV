<!DOCTYPE html>
<html>
<head>
  <title>Smart Gaav</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#064e3b);color:white;min-height:100vh}
    .center{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{width:100%;max-width:430px;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.2);border-radius:25px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:0;font-size:15px}
    input,select{background:white;color:#111}
    button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
    .logout{background:#ef4444}
    .top{padding:18px;max-width:900px;margin:auto}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
    .tile{background:rgba(255,255,255,.15);padding:18px;border-radius:18px;text-align:center;border:1px solid rgba(255,255,255,.18);cursor:pointer}
    .hidden{display:none}
    .small{font-size:13px;color:#d1fae5}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:15px}
    .stat{background:rgba(255,255,255,.13);padding:14px;border-radius:16px;text-align:center}
    .stat b{font-size:24px}
    .list{margin-top:18px;background:rgba(255,255,255,.10);padding:15px;border-radius:18px;max-height:500px;overflow:auto}
    .item{background:rgba(255,255,255,.12);padding:12px;border-radius:14px;margin-bottom:10px;text-align:left;border:1px solid rgba(255,255,255,.15)}
    a{color:#86efac}
  </style>
</head>

<body>

<div id="loginPage" class="center">
  <div class="card">
    <h1>🌿 Smart Gaav</h1>
    <p class="small">Digital Gram Panchayat App</p>
    <input id="userid" placeholder="User ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="small">Signup nahi. User ID admin kadun milel.</p>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="top">
    <h2 id="welcome">Welcome</h2>
    <p id="roleText" class="small"></p>

    <div id="statsBox" class="stats hidden">
      <div class="stat"><b id="totalCount">0</b><br>Total</div>
      <div class="stat"><b id="pendingCount">0</b><br>Pending</div>
      <div class="stat"><b id="doneCount">0</b><br>Done</div>
    </div>

    <div class="grid">
      <div class="tile" onclick="openComplaint()">📸<br>Complaint Tak</div>
      <div class="tile" onclick="showComplaints()">📋<br>Complaints</div>
      <div class="tile" onclick="showNotice()">📢<br>Notice</div>
      <div class="tile" onclick="showEmergency()">🚨<br>Emergency</div>
      <div class="tile" onclick="showProfile()">👤<br>Profile</div>
      <div class="tile" onclick="showYojana()">🏛️<br>Yojana</div>
      <div class="tile" onclick="showDirectory()">🏪<br>Directory</div>
      <div id="adminTile" class="tile hidden" onclick="showAdmin()">👑<br>Admin</div>
      <div class="tile logout" onclick="logout()">🚪<br>Logout</div>
    </div>

    <div id="complaintBox" class="list hidden"></div>
  </div>
</div>

<script>
const GOOGLE_FORM_LINK = "https://docs.google.com/forms/d/e/1FAIpQLSeUPWZjLyAOw4onOJo8IaVuLrRzLgcan3rcF5oJmuwYlesjpg/viewform?usp=dialog";
const GOOGLE_SHEET_JSON_LINK = "https://docs.google.com/spreadsheets/d/1ucvPtqDwXeENkjp2bFSHdF-tYzAohXqLiYHyBt6kGp8/gviz/tq?tqx=out:json";

let users = [
  { id:"ADMIN", pass:"1234", name:"Mahesh Admin", mobile:"98xxxxxxx", address:"Gaav", role:"Admin" },
  { id:"GAAV001", pass:"1234", name:"Ramesh", mobile:"97xxxxxxx", address:"Wasti 1", role:"User" },
  { id:"GAAV002", pass:"1234", name:"Suresh", mobile:"96xxxxxxx", address:"Wasti 2", role:"User" }
];

let currentUser = null;
let allComplaints = [];

function login(){
  let id = document.getElementById("userid").value.trim();
  let pass = document.getElementById("password").value.trim();
  let user = users.find(u => u.id === id && u.pass === pass);

  if(user){
    currentUser = user;
    localStorage.setItem("smartgaav_user", JSON.stringify(user));
    openApp();
  } else {
    alert("Wrong ID or Password");
  }
}

function openApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Namaskar, " + currentUser.name;
  document.getElementById("roleText").innerText = "Role: " + currentUser.role + " | ID: " + currentUser.id;

  if(currentUser.role === "Admin"){
    document.getElementById("adminTile").classList.remove("hidden");
    document.getElementById("statsBox").classList.remove("hidden");
    loadComplaints(false);
  }
}

window.onload = function(){
  let saved = localStorage.getItem("smartgaav_user");
  if(saved){
    currentUser = JSON.parse(saved);
    openApp();
  }
}

function logout(){
  localStorage.removeItem("smartgaav_user");
  location.reload();
}

function openComplaint(){
  window.open(GOOGLE_FORM_LINK, "_blank");
}

function loadComplaints(showBox=true){
  const box = document.getElementById("complaintBox");
  if(showBox){
    box.classList.remove("hidden");
    box.innerHTML = "Loading complaints...";
  }

  fetch(GOOGLE_SHEET_JSON_LINK)
    .then(res => res.text())
    .then(data => {
      let json = JSON.parse(data.substr(47).slice(0,-2));
      let rows = json.table.rows;

      allComplaints = rows.map((r, index) => ({
        no:index+1,
        userId:r.c[0]?.v || "N/A",
        name:r.c[1]?.v || "N/A",
        problem:r.c[2]?.v || "N/A",
        photo:r.c[3]?.v || "",
        date:r.c[4]?.f || r.c[4]?.v || "N/A",
        status:r.c[5]?.v || "Pending"
      }));

      updateStats();

      if(showBox) renderComplaints(allComplaints);
    })
    .catch(err => {
      if(showBox) box.innerHTML = "Error: Sheet public nahi kiwa link wrong ahe.";
    });
}

function updateStats(){
  let total = allComplaints.length;
  let pending = allComplaints.filter(c => c.status.toLowerCase().includes("pending")).length;
  let done = allComplaints.filter(c => c.status.toLowerCase().includes("done")).length;

  document.getElementById("totalCount").innerText = total;
  document.getElementById("pendingCount").innerText = pending;
  document.getElementById("doneCount").innerText = done;
}

function showComplaints(){
  if(currentUser.role !== "Admin"){
    alert("Fakt Admin complaints list pahu shakto.");
    return;
  }
  loadComplaints(true);
}

function renderComplaints(list){
  const box = document.getElementById("complaintBox");

  let html = `
    <h3>📋 Complaints List</h3>
    <input id="searchBox" placeholder="Search by name, problem, user id" oninput="filterComplaints()">
    <select id="statusFilter" onchange="filterComplaints()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="done">Done</option>
      <option value="progress">In Progress</option>
    </select>
  `;

  if(list.length === 0){
    html += "<p>No complaints found.</p>";
  }

  list.forEach(c => {
    html += `
      <div class="item">
        <b>#${c.no} - ${c.problem}</b><br>
        👤 User: ${c.name} (${c.userId})<br>
        📅 Date: ${c.date}<br>
        📌 Status: ${c.status}<br>
        ${c.photo ? `<a href="${c.photo}" target="_blank">📷 View Photo</a>` : ""}
      </div>
    `;
  });

  box.innerHTML = html;
}

function filterComplaints(){
  let q = document.getElementById("searchBox").value.toLowerCase();
  let status = document.getElementById("statusFilter").value.toLowerCase();

  let filtered = allComplaints.filter(c => {
    let text = (c.userId + " " + c.name + " " + c.problem).toLowerCase();
    let statusMatch = status === "all" || c.status.toLowerCase().includes(status);
    return text.includes(q) && statusMatch;
  });

  renderComplaints(filtered);
  document.getElementById("searchBox").value = q;
  document.getElementById("statusFilter").value = status;
}

function showNotice(){
  alert("📢 Notice:\nAaj Gram Sabha sandhyakali 5 vajta ahe.\nPani supply udya sakali 7 te 9.");
}

function showEmergency(){
  alert("🚨 Emergency Contacts:\nAmbulance: 108\nPolice: 100\nSarpanch: 98xxxxxxx\nDoctor: 99xxxxxxx");
}

function showProfile(){
  alert("👤 Profile:\nName: " + currentUser.name + "\nID: " + currentUser.id + "\nMobile: " + currentUser.mobile + "\nAddress: " + currentUser.address);
}

function showYojana(){
  alert("🏛️ Sarkari Yojana:\nPM Awas Yojana\nRation Card\nFarmer Scheme\nScholarship");
}

function showDirectory(){
  alert("🏪 Gaav Directory:\nKirana Store\nMedical\nElectrician\nPlumber\nTractor Service");
}

function showAdmin(){
  alert("👑 Admin Panel:\nTotal complaints dashboard active ahe.\nSearch/filter complaint list madhe available ahe.");
}
</script>

</body>
</html>
